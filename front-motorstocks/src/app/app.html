<div
  style="font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f4; color: #111111; min-height: 100vh; padding-bottom: 60px;">

  <!-- BARRA DE NAVEGACIÓN -->
  <nav
    style="background-color: #111111; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
    <div style="display: flex; align-items: center; gap: 25px;">
      <span (click)="cambiarSeccion('catalogo')"
        style="font-size: 1.8em; font-weight: 900; letter-spacing: -1px; color: #ffffff; text-transform: uppercase; cursor: pointer;">
        Motor<span style="color: #0044ff;">Stocks</span>
      </span>

      <!-- Enlaces Rápidos (Botones Próximamente) -->
      <div
        style="display: none; @media(min-width: 768px){display: flex;} gap: 20px; margin-left: 20px; border-left: 1px solid #333; padding-left: 20px;">
        <button (click)="mostrarProximamente()"
          style="background: transparent; color: #ffffff; border: none; font-weight: 600; font-size: 0.9em; cursor: pointer; text-transform: uppercase;">Vehículos</button>
        <button (click)="mostrarProximamente()"
          style="background: transparent; color: #ffffff; border: none; font-weight: 600; font-size: 0.9em; cursor: pointer; text-transform: uppercase;">Ofertas</button>
        <button (click)="mostrarProximamente()"
          style="background: transparent; color: #ffffff; border: none; font-weight: 600; font-size: 0.9em; cursor: pointer; text-transform: uppercase;">Financiamiento</button>
      </div>
    </div>

    <div style="display: flex; gap: 15px; align-items: center; position: relative;">
      <button (click)="cambiarSeccion('catalogo')" [style.color]="seccionActiva === 'catalogo' ? '#0044ff' : '#ffffff'"
        style="background: transparent; border: none; padding: 8px 12px; font-size: 0.95em; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase;">Catálogo</button>

      <button *ngIf="usuarioLogueado?.rol === 'admin'" (click)="cambiarSeccion('admin')"
        [style.color]="seccionActiva === 'admin' ? '#0044ff' : '#ffffff'"
        style="background: transparent; border: none; padding: 8px 12px; font-size: 0.95em; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase;">Panel
        Admin</button>

      <ng-container *ngIf="!usuarioLogueado">
        <button (click)="cambiarSeccion('login')"
          style="color: #ffffff; background-color: transparent; border: 1px solid #ffffff; padding: 8px 20px; font-size: 0.9em; font-weight: 600; cursor: pointer; border-radius: 4px; transition: 0.2s; text-transform: uppercase;"
          onmouseover="this.style.backgroundColor='#ffffff'; this.style.color='#111111'"
          onmouseout="this.style.backgroundColor='transparent'; this.style.color='#ffffff'">Ingresar</button>
        <button (click)="cambiarSeccion('registro')"
          style="color: #ffffff; background-color: #0044ff; border: none; padding: 9px 20px; font-size: 0.9em; font-weight: 600; cursor: pointer; border-radius: 4px; transition: 0.2s; text-transform: uppercase;"
          onmouseover="this.style.backgroundColor='#0033cc'"
          onmouseout="this.style.backgroundColor='#0044ff'">Registro</button>
      </ng-container>

      <ng-container *ngIf="usuarioLogueado">
        <div style="position: relative;">
          <button (click)="toggleMenuPerfil()"
            style="background-color: transparent; color: #ffffff; border: none; padding: 8px; font-size: 0.95em; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px;">
            Hola, {{usuarioLogueado.nombre}} ▼
          </button>

          <div *ngIf="menuPerfilAbierto"
            style="position: absolute; top: 130%; right: 0; background-color: #ffffff; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; min-width: 220px; z-index: 1001; border: 1px solid #ddd;">
            <div style="padding: 20px; border-bottom: 1px solid #eee; background-color: #f9f9f9;">
              <p style="margin: 0; font-weight: 800; color: #111111; text-transform: uppercase; font-size: 0.9em;">
                {{usuarioLogueado.nombre}} {{usuarioLogueado.apellido}}</p>
              <p style="margin: 5px 0 0 0; font-size: 0.8em; color: #555;">{{usuarioLogueado.correo}}</p>
            </div>
            <button (click)="cambiarSeccion('perfil')"
              style="width: 100%; text-align: left; padding: 12px 20px; border: none; background: transparent; cursor: pointer; color: #333; font-size: 0.9em; font-weight: 600; border-bottom: 1px solid #eee; transition: background 0.2s;"
              onmouseover="this.style.background='#f4f4f4'" onmouseout="this.style.background='transparent'">👤 Mi
              Perfil</button>
            <button *ngIf="usuarioLogueado?.rol !== 'admin'" (click)="irAHistorialCitas()"
              style="width: 100%; text-align: left; padding: 12px 20px; border: none; background: transparent; cursor: pointer; color: #333; font-size: 0.9em; font-weight: 600; border-bottom: 1px solid #eee; transition: background 0.2s;"
              onmouseover="this.style.background='#f4f4f4'" onmouseout="this.style.background='transparent'">📋 Mis
              Citas</button>
            <button (click)="cerrarSesion()"
              style="width: 100%; text-align: left; padding: 12px 20px; border: none; background: transparent; cursor: pointer; color: #0044ff; font-size: 0.9em; font-weight: 700; transition: background 0.2s;"
              onmouseover="this.style.background='#eff6ff'" onmouseout="this.style.background='transparent'">🚪 Cerrar
              sesión</button>
          </div>
        </div>
      </ng-container>
    </div>
  </nav>

  <!-- CATÁLOGO (también se renderiza oculto cuando estamos en admin para preservar el ViewChild y el modal de registro) -->
  <div [style.display]="seccionActiva === 'catalogo' ? 'block' : 'none'">
    <app-catalogo
      #catalogoRef
      [usuarioLogueado]="usuarioLogueado"
      (irALogin)="cambiarSeccion('login')">
    </app-catalogo>
  </div>

  <!-- LOGIN -->
  <div *ngIf="seccionActiva === 'login'">
    <app-login
      (loginExitoso)="onLoginExitoso($event)"
      (irARegistro)="cambiarSeccion('registro')">
    </app-login>
  </div>

  <!-- REGISTRO -->
  <div *ngIf="seccionActiva === 'registro'">
    <app-registro
      (registroExitoso)="onRegistroExitoso()"
      (irALogin)="cambiarSeccion('login')">
    </app-registro>
  </div>

  <!-- PANEL ADMIN -->
  <div *ngIf="seccionActiva === 'admin'">
    <app-admin
      [usuarioLogueado]="usuarioLogueado"
      [listaCarros]="listaCarrosAdmin"
      (solicitarRegistroAuto)="onSolicitarRegistroAuto()">
    </app-admin>
  </div>

  <!-- PERFIL -->
  <div *ngIf="seccionActiva === 'perfil'">
    <app-perfil
      [usuarioLogueado]="usuarioLogueado"
      (irACatalogo)="cambiarSeccion('catalogo')">
    </app-perfil>
  </div>

  <!-- LOGOUT -->
  <div *ngIf="seccionActiva === 'logout'"
    style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; padding: 40px 20px;">
    <div style="background-color: #ffffff; border-radius: 16px; padding: 60px 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); max-width: 420px; width: 100%; border: 1px solid #e2e8f0;">
      <div style="font-size: 3em; margin-bottom: 20px;">👋</div>
      <h2 style="font-size: 1.8em; font-weight: 900; color: #111111; margin: 0 0 10px 0; text-transform: uppercase;">¡Hasta pronto!</h2>
      <p style="color: #555; font-size: 1em; margin: 0 0 25px 0;">
        Sesión cerrada exitosamente<span *ngIf="_nombreLogout">, <strong>{{ _nombreLogout }}</strong></span>.
      </p>
      <div style="display: flex; align-items: center; justify-content: center; gap: 10px; color: #0044ff; font-size: 0.88em; font-weight: 600;">
        <div style="width: 14px; height: 14px; border: 2px solid #0044ff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;"></div>
        Volviendo al catálogo...
      </div>
    </div>
  </div>

  <!-- Componentes con rutas propias (agendar-cita, historial-citas) -->
  <router-outlet></router-outlet>

</div>
