<div style="max-width: 460px; margin: 60px auto; padding: 0 20px;">
  <div
    style="background-color: #ffffff; padding: 40px; border: 1px solid #ddd; box-shadow: 0 10px 40px rgba(0,0,0,0.05);">
    <h2 style="margin-top: 0; text-align: center; font-size: 2.2em; color: #111111; font-weight: 800;">Crear Cuenta
    </h2>
    <p style="text-align: center; color: #555; margin-bottom: 35px; font-size: 1em;">Únete a MotorStocks. Operaciones
      exclusivas en Caracas, Venezuela.</p>

    <form (submit)="registrarUsuario($event)" style="display: flex; flex-direction: column; gap: 22px;">
      <div style="display: flex; gap: 15px;">
        <div style="flex: 1;">
          <label
            style="display: block; margin-bottom: 8px; font-size: 0.95em; font-weight: 600; color: #111111;">Nombre</label>
          <input type="text" id="nombre" name="nombre" [(ngModel)]="registroData.nombre" placeholder="Ej. Carlos"
            required
            style="width: 100%; padding: 12px 16px; background-color: #f9f9f9; border: 1px solid #ccc; box-sizing: border-box;">
        </div>
        <div style="flex: 1;">
          <label
            style="display: block; margin-bottom: 8px; font-size: 0.95em; font-weight: 600; color: #111111;">Apellido</label>
          <input type="text" id="apellido" name="apellido" [(ngModel)]="registroData.apellido"
            placeholder="Ej. Mendoza" required
            style="width: 100%; padding: 12px 16px; background-color: #f9f9f9; border: 1px solid #ccc; box-sizing: border-box;">
        </div>
      </div>

      <div>
        <label style="display: block; margin-bottom: 8px; font-size: 0.95em; font-weight: 600; color: #111111;">Correo
          Electrónico</label>
        <input type="email" id="correo" name="correo" [(ngModel)]="registroData.correo"
          placeholder="carlos@motorstocks.com" required
          style="width: 100%; padding: 12px 16px; background-color: #f9f9f9; border: 1px solid #ccc; box-sizing: border-box;">
        <div *ngIf="errorCorreo" style="color: #dc2626; font-size: 0.85em; margin-top: 5px; font-weight: 600;">⚠️ {{
          errorCorreo }}</div>
      </div>

      <div>
        <label style="display: block; margin-bottom: 8px; font-size: 0.95em; font-weight: 600; color: #111111;">Fecha
          de Nacimiento</label>
        <input type="date" id="fechaNacimiento" name="fechaNacimiento" [(ngModel)]="registroData.fechaNacimiento"
          required
          style="width: 100%; padding: 12px 16px; background-color: #f9f9f9; border: 1px solid #ccc; box-sizing: border-box;">
        <div *ngIf="errorFechaNacimiento"
          style="color: #dc2626; font-size: 0.85em; margin-top: 5px; font-weight: 600;">⚠️ {{ errorFechaNacimiento }}
        </div>
      </div>

      <div>
        <label
          style="display: block; margin-bottom: 8px; font-size: 0.95em; font-weight: 600; color: #111111;">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="registroData.password"
          placeholder="Mínimo 8 caracteres, 1 número y 1 símbolo" required
          style="width: 100%; padding: 12px 16px; background-color: #f9f9f9; border: 1px solid #ccc; box-sizing: border-box;">
        <div *ngIf="errorPassword" style="color: #dc2626; font-size: 0.85em; margin-top: 5px; font-weight: 600;">⚠️ {{
          errorPassword }}</div>
      </div>

      <div style="display: flex; flex-direction: column;">
        <div style="display: flex; align-items: flex-start; gap: 10px;">
          <input type="checkbox" id="terminos" name="aceptaTerminos" [(ngModel)]="registroData.aceptaTerminos"
            required style="margin-top: 4px; transform: scale(1.2);">
          <label for="terminos" style="font-size: 0.9em; color: #555; line-height: 1.4;">
            Acepto los Términos y Condiciones. Entiendo que las compras y ventas se procesarán únicamente en
            <strong>Caracas, Venezuela</strong>.
          </label>
        </div>
        <div *ngIf="errorTerminos" style="color: #dc2626; font-size: 0.85em; margin-top: 5px; font-weight: 600;">⚠️ {{
          errorTerminos }}</div>
      </div>

      <div *ngIf="mensajeError"
        style="background-color: #fef2f2; border-left: 4px solid #dc2626; color: #dc2626; padding: 12px 16px; font-size: 0.95em; font-weight: 600; line-height: 1.4; text-align: left;">
        ⚠️ {{ mensajeError }}
      </div>

      <div *ngIf="mensajeExito"
        style="background-color: #f0fdf4; border-left: 4px solid #16a34a; color: #16a34a; padding: 12px 16px; font-size: 0.95em; font-weight: 600; text-align: left;">
        🎉 {{ mensajeExito }}
      </div>

      <button type="submit"
        style="width: 100%; background-color: #111111; color: #ffffff; border: none; padding: 15px; font-weight: 800; text-transform: uppercase; font-size: 1em; cursor: pointer; transition: 0.2s;"
        onmouseover="this.style.backgroundColor='#333'" onmouseout="this.style.backgroundColor='#111111'">Crear
        Cuenta</button>
    </form>
  </div>
</div>
